<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Video Library Search</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>🎬 Video Library Search</h1>
  <div class="header-actions">
    <button id="add-folder-btn" title="Add a folder of videos to the library">+ Add folder</button>
    <button id="rescan-btn" title="Re-scan known folders for new or changed videos">Re-scan</button>
    <button id="settings-btn" title="Settings">⚙</button>
  </div>
</header>

<div id="progress-banner" class="hidden">
  <div class="progress-text">
    <span id="progress-label">Indexing…</span>
    <span id="progress-detail"></span>
  </div>
  <div class="progress-track"><div id="progress-fill"></div></div>
</div>

<main>
  <form id="search-form" autocomplete="off">
    <input id="search-input" type="search"
           placeholder="Describe a moment… e.g. “a dog catching a frisbee in a park”"
           aria-label="Search your video library">
    <button type="submit">Search</button>
  </form>

  <div id="status-line" class="muted"></div>
  <div id="results" class="results-grid"></div>

  <div id="empty-state" class="empty hidden">
    <p id="empty-title"></p>
    <p id="empty-hint" class="muted"></p>
  </div>
</main>

<dialog id="settings-dialog">
  <h2>Settings</h2>
  <dl>
    <dt>Library database</dt><dd id="set-datadir"></dd>
    <dt>Indexed</dt><dd id="set-stats"></dd>
    <dt>Model</dt><dd id="set-model"></dd>
    <dt>Watched folders</dt><dd id="set-folders"></dd>
  </dl>
  <div class="dialog-actions">
    <button id="reset-btn" class="danger">Clear library…</button>
    <button id="close-settings-btn">Close</button>
  </div>
</dialog>

<script src="app.js"></script>
</body>
</html>
